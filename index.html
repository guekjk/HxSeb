<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sebastian &amp; Hui Xin — Wedding Invitation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Floating petals container -->
  <div class="petals-container" id="petalsContainer"></div>

  <!-- ===== FRONT PAGE ===== -->
  <div class="scene" id="scene">

    <!-- Envelope wrapper -->
    <div class="envelope" id="envelope" tabindex="0" role="button" aria-label="Open wedding invitation">

      <!-- Envelope back -->
      <div class="envelope__back"></div>

      <!-- Corner flower decorations (inline SVG so no external reference needed) -->
      <div class="corner corner--tl">
        <svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg" width="62" height="62">
          <g transform="translate(31,31)">
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(30 16 4)"/>
            <ellipse cx="-16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(-30 -16 4)"/>
            <circle cx="0" cy="0" r="6" fill="#f5c842"/>
            <circle cx="0" cy="0" r="3" fill="#e8a020"/>
          </g>
        </svg>
      </div>
      <div class="corner corner--tr">
        <svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg" width="62" height="62">
          <g transform="translate(31,31)">
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(30 16 4)"/>
            <ellipse cx="-16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(-30 -16 4)"/>
            <circle cx="0" cy="0" r="6" fill="#f5c842"/>
            <circle cx="0" cy="0" r="3" fill="#e8a020"/>
          </g>
        </svg>
      </div>
      <div class="corner corner--bl">
        <svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg" width="62" height="62">
          <g transform="translate(31,31)">
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(30 16 4)"/>
            <ellipse cx="-16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(-30 -16 4)"/>
            <circle cx="0" cy="0" r="6" fill="#f5c842"/>
            <circle cx="0" cy="0" r="3" fill="#e8a020"/>
          </g>
        </svg>
      </div>
      <div class="corner corner--br">
        <svg viewBox="0 0 62 62" xmlns="http://www.w3.org/2000/svg" width="62" height="62">
          <g transform="translate(31,31)">
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(30 16 4)"/>
            <ellipse cx="-16" cy="4" rx="7" ry="3" fill="#7ab648" opacity="0.8" transform="rotate(-30 -16 4)"/>
            <circle cx="0" cy="0" r="6" fill="#f5c842"/>
            <circle cx="0" cy="0" r="3" fill="#e8a020"/>
          </g>
        </svg>
      </div>

      <!-- Wax seal (CSS div approach — more reliable cross-browser) -->
        <div class="wax-seal">
          <div class="wax-seal__blob">
            <span class="wax-seal__initials">SGHX</span>
          </div>
        </div>
      </div>
      
      <!-- Envelope front body -->
      <div class="envelope__body">
        <!-- Names and date -->
        <div class="envelope__text">
          <p class="env-names">Sebastian &amp; Hui Xin</p>
          <p class="env-date">17 &amp; 18 October 2026</p>
        </div>


      <!-- Flap (triangle pointing down, folds open on click) -->
      <div class="envelope__flap" id="flap">
        <svg width="100%" height="220" viewBox="0 0 420 220" preserveAspectRatio="none"
             xmlns="http://www.w3.org/2000/svg">
          <polygon points="0,0 420,0 210,220" fill="#f0e0c8"/>
          <polygon points="0,0 420,0 210,220" fill="none" stroke="#c8a882" stroke-width="1.5"/>
        </svg>
      </div>

      <!-- Click hint -->
      <p class="click-hint" id="clickHint">Click to open</p>
    </div>

    <!-- ===== WEDDING CARD (revealed on envelope open) ===== -->
    <div class="card" id="card">

      <!-- Card corner flowers -->
      <div class="card-corner card-corner--tl">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" width="50" height="50">
          <g transform="translate(25,25)">
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(30 12 3)"/>
            <ellipse cx="-12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(-30 -12 3)"/>
            <circle cx="0" cy="0" r="5" fill="#f5c842"/>
            <circle cx="0" cy="0" r="2.5" fill="#e8a020"/>
          </g>
        </svg>
      </div>
      <div class="card-corner card-corner--tr">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" width="50" height="50">
          <g transform="translate(25,25)">
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(30 12 3)"/>
            <ellipse cx="-12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(-30 -12 3)"/>
            <circle cx="0" cy="0" r="5" fill="#f5c842"/>
            <circle cx="0" cy="0" r="2.5" fill="#e8a020"/>
          </g>
        </svg>
      </div>
      <div class="card-corner card-corner--bl">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" width="50" height="50">
          <g transform="translate(25,25)">
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(30 12 3)"/>
            <ellipse cx="-12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(-30 -12 3)"/>
            <circle cx="0" cy="0" r="5" fill="#f5c842"/>
            <circle cx="0" cy="0" r="2.5" fill="#e8a020"/>
          </g>
        </svg>
      </div>
      <div class="card-corner card-corner--br">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" width="50" height="50">
          <g transform="translate(25,25)">
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(72)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(144)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(216)"/>
            <ellipse cx="0" cy="-11" rx="4" ry="8" fill="#e8a0a0" opacity="0.9" transform="rotate(288)"/>
            <ellipse cx="12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(30 12 3)"/>
            <ellipse cx="-12" cy="3" rx="5" ry="2.5" fill="#7ab648" opacity="0.8" transform="rotate(-30 -12 3)"/>
            <circle cx="0" cy="0" r="5" fill="#f5c842"/>
            <circle cx="0" cy="0" r="2.5" fill="#e8a020"/>
          </g>
        </svg>
      </div>

      <!-- Card content -->
      <div class="card__inner">
        <!-- Decorative vine top -->
        <div class="card__vine">
          <svg viewBox="0 0 380 24" xmlns="http://www.w3.org/2000/svg" width="100%" height="24">
            <path d="M0,12 Q47,4 95,12 Q143,20 190,12 Q237,4 285,12 Q332,20 380,12"
                  fill="none" stroke="#c8a882" stroke-width="1.5"/>
            <circle cx="95"  cy="12" r="3" fill="#e8a0a0"/>
            <circle cx="190" cy="12" r="3" fill="#e8a0a0"/>
            <circle cx="285" cy="12" r="3" fill="#e8a0a0"/>
            <ellipse cx="47"  cy="8"  rx="6" ry="2.5" fill="#a8c878" opacity="0.7" transform="rotate(-20 47 8)"/>
            <ellipse cx="143" cy="16" rx="6" ry="2.5" fill="#a8c878" opacity="0.7" transform="rotate(20 143 16)"/>
            <ellipse cx="237" cy="8"  rx="6" ry="2.5" fill="#a8c878" opacity="0.7" transform="rotate(-20 237 8)"/>
            <ellipse cx="332" cy="16" rx="6" ry="2.5" fill="#a8c878" opacity="0.7" transform="rotate(20 332 16)"/>
          </svg>
        </div>

        <p class="card__together">Together with their families</p>

        <h1 class="card__names">
          Sebastian<br/>
          <span class="card__amp">&amp;</span><br/>
          Hui Xin
        </h1>

        <p class="card__request">
          joyfully request the honour of your presence<br/>
          at the celebration of their marriage
        </p>

        <div class="card__date-block">
          <p class="card__date">17 <span class="card__amp-sm">&amp;</span> 18 October 2026</p>
        </div>

        <div class="card__divider">
          <div class="card__divider-line"></div>
          <div class="card__divider-dot"></div>
          <div class="card__divider-line"></div>
        </div>

        <a class="card__rsvp-btn" href="https://withjoy.com/sebastian-and-huixin/rsvp"
           target="_blank" rel="noopener noreferrer">RSVP</a>

        <!-- Decorative vine bottom (flipped) -->
        <div class="card__vine card__vine--bottom">
          <svg viewBox="0 0 380 24" xmlns="http://www.w3.org/2000/svg" width="100%" height="24"
               style="transform:scaleY(-1)">
            <path d="M0,12 Q47,4 95,12 Q143,20 190,12 Q237,4 285,12 Q332,20 380,12"
                  fill="none" stroke="#c8a882" stroke-width="1.5"/>

            <circle cx="190" cy="12" r="3" fill="#e8a0a0"/>

            <ellipse cx="237" cy="8"  rx="6" ry="2.5" fill="#a8c878" opacity="0.7" transform="rotate(-20 237 8)"/>
            <ellipse cx="332" cy="16" rx="6" ry="2.5" fill="#a8c878" opacity="0.7" transform="rotate(20 332 16)"/>
          </svg>
        </div>
      </div>
    </div>

  </div><!-- /.scene -->

  <script src="script.js"></script>
</body>
</html>
